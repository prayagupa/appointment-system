apiVersion: apps/v1
kind: Deployment
metadata:
  name: appointment-rpc
spec:
  replicas: 2
  selector:
    matchLabels:
      app: appointment-rpc
  template:
    metadata:
      labels:
        app: appointment-rpc
    spec:
      containers:
        - name: appointment-rpc
          image: appointment-rpc:latest
          ports:
            - name: http
              containerPort: 8080
            - name: grpc
              containerPort: 9090
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: appointment-rpc-secrets
                  key: db-host
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: appointment-rpc-secrets
                  key: db-name
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: appointment-rpc-secrets
                  key: db-user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: appointment-rpc-secrets
                  key: db-password
            - name: AUTH_ENABLED
              value: "true"
            - name: API_KEYS
              valueFrom:
                secretKeyRef:
                  name: appointment-rpc-secrets
                  key: api-keys
            - name: GRPC_TLS_ENABLED
              value: "true"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 20
