spring:
  datasource:
    url: jdbc:h2:mem:appointment;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  liquibase:
    contexts: dev

grpc:
  server:
    in-process-name: appointment-test
    port: -1
  client:
    appointment:
      address: in-process:appointment-test
      negotiation-type: plaintext

appointment:
  auth:
    enabled: false
