spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  application:
    name: appointment-rpc
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:appointment}
    username: ${DB_USER:appointment}
    password: ${DB_PASSWORD:appointment}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

server:
  port: 8080

grpc:
  server:
    port: 9090
    security:
      enabled: ${GRPC_TLS_ENABLED:false}
      certificate-chain: ${GRPC_TLS_CERT:}
      private-key: ${GRPC_TLS_KEY:}

appointment:
  auth:
    enabled: ${AUTH_ENABLED:false}
    api-keys: ${API_KEYS:dev-key}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  pattern:
    console: '{"timestamp":"%d{yyyy-MM-dd''T''HH:mm:ss.SSSZ}","level":"%p","logger":"%c{1}","tenant":"%X{tenantId}","trace":"%X{traceId}","msg":"%m"}%n'
